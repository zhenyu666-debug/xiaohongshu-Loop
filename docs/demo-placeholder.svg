<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-label="xiaohongshu-Loop demo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF2442"/>
      <stop offset="100%" stop-color="#7A0010"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#ffffff" text-anchor="middle">
    <text x="480" y="240" font-size="56" font-weight="700" letter-spacing="2">DEMO PLACEHOLDER</text>
    <text x="480" y="300" font-size="22" opacity="0.85">Replace with docs/demo-loop.gif (1280x720, &lt; 10 MB)</text>
    <text x="480" y="360" font-size="16" opacity="0.6">xiaohongshu-Loop Ę account pool / content / scheduler / risk / adapters</text>
  </g>
  <g transform="translate(40,40)" font-family="ui-monospace, monospace" font-size="13" fill="rgba(255,255,255,0.6)">
    <text x="0" y="0">$ docker compose up -d</text>
    <text x="0" y="22">$ python scripts/e2e_smoke.py</text>
    <text x="0" y="44">$ open http://localhost:8080/console</text>
  </g>
</svg>
