name: xhs-saas-ci

on:
  push:
    branches: [main]
    paths:
      - 'xiaohongshu-saas/**'
      - '.github/workflows/xhs-saas-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'xiaohongshu-saas/**'
      - '.github/workflows/xhs-saas-ci.yml'

# The runner checks out this repo under $GITHUB_WORKSPACE/xiaohongshu-Loop/ (note
# the double "xiaohongshu-Loop/xiaohongshu-Loop"). All paths below use that
# nested form so explicit cwd stays in $GITHUB_WORKSPACE and pytest/vite
# commands don't run from the wrong root.

jobs:
  xhs-saas-backend:
    name: xhs-saas backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: xiaohongshu-Loop/xiaohongshu-saas/pyproject.toml
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "xiaohongshu-Loop/xiaohongshu-saas[dev]"
      - name: Ruff
        run: ruff check xiaohongshu-Loop/xiaohongshu-saas
      - name: Pytest
        run: pytest -q xiaohongshu-Loop/xiaohongshu-saas/tests

  xhs-saas-console:
    name: xhs-saas console (tsc + vitest + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: xiaohongshu-Loop/xiaohongshu-saas/web/console/package-lock.json
      - name: npm ci
        run: npm ci --prefix xiaohongshu-Loop/xiaohongshu-saas/web/console
      - name: vitest
        run: npm test --prefix xiaohongshu-Loop/xiaohongshu-saas/web/console -- --run
      - name: vite build
        run: npm run build --prefix xiaohongshu-Loop/xiaohongshu-saas/web/console

  pbp-api:
    name: donor-screener-pbp (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: xiaohongshu-Loop/donor-screener-pbp/requirements.txt
      - name: Install pbp deps
        run: |
          python -m pip install --upgrade pip
          pip install -r xiaohongshu-Loop/donor-screener-pbp/requirements.txt
      - name: Pytest pbp
        run: pytest -q xiaohongshu-Loop/donor-screener-pbp/tests

  lakehouse-api:
    name: data-lakehouse (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: xiaohongshu-Loop/data-lakehouse/pyproject.toml
      - name: Install lakehouse deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "xiaohongshu-Loop/data-lakehouse[dev]"
      - name: Pytest lakehouse
        run: pytest -q xiaohongshu-Loop/data-lakehouse/tests
