name: xhs-saas-ci

on:
  push:
    branches: [main]
    paths:
      - 'xiaohongshu-saas/**'
  pull_request:
    branches: [main]
    paths:
      - 'xiaohongshu-saas/**'

defaults:
  run:
    working-directory: xiaohongshu-saas

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: xiaohongshu-saas/pyproject.toml

      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          # Skip playwright/redis — dev extras cover ruff+pytest, and browser deps blow up the runner.
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q tests