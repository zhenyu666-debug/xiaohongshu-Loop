name: xhs-saas-ci

on:
  push:
    branches: [main]
    paths:
      - 'xiaohongshu-saas/**'
      - '.github/workflows/xhs-saas-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'xiaohongshu-saas/**'
      - '.github/workflows/xhs-saas-ci.yml'

jobs:
  xhs-saas-backend:
    name: xhs-saas backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: xiaohongshu-saas/pyproject.toml
      - name: Install backend deps
        working-directory: xiaohongshu-saas
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        working-directory: xiaohongshu-saas
        run: ruff check .
      - name: Pytest
        working-directory: xiaohongshu-saas
        run: pytest -q tests

  xhs-saas-console:
    name: xhs-saas console (tsc + vitest + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: xiaohongshu-saas/web/console/package-lock.json
      - name: npm ci
        working-directory: xiaohongshu-saas/web/console
        run: npm ci
      - name: vitest
        working-directory: xiaohongshu-saas/web/console
        run: npm test -- --run
      - name: vite build
        working-directory: xiaohongshu-saas/web/console
        run: npm run build

  pbp-api:
    name: donor-screener-pbp (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: donor-screener-pbp/requirements.txt
      - name: Install pbp deps
        working-directory: donor-screener-pbp
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pytest pbp
        working-directory: donor-screener-pbp
        run: pytest -q tests

  lakehouse-api:
    name: data-lakehouse (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data-lakehouse/pyproject.toml
      - name: Install lakehouse deps
        working-directory: data-lakehouse
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest lakehouse
        working-directory: data-lakehouse
        run: pytest -q tests
