# Alembic configuration for xhs-saas.
# Database URL is read from the app's Settings (which itself reads .env),
# so the same DATABASE_URL that powers runtime also drives migrations.

[alembic]
# Path to the migration scripts directory (relative to this file).
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path - appended so env.py can import app...
prepend_sys_path = .

# Timezone for migration timestamps. Leave blank for UTC.
timezone = Asia/Shanghai

# Max identifier length (sqlite = no limit).
truncate_slug_length = 40

# Don't emit any revision files when generating empty migrations.
revision_environment = false

# Treat "sourceless" migrations (no Python file) as upgrades.
sourceless = false

# Version path separator (use os.pathsep-friendly).
version_path_separator = os

# `sqlalchemy.url` is intentionally NOT set here -- env.py reads from app.core.config.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S