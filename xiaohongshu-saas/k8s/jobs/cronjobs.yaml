apiVersion: batch/v1
kind: CronJob
metadata:
  name: xhs-db-backup
  namespace: xhs-saas
  labels:
    app: xhs-saas
    job-type: backup
spec:
  schedule: "0 2 * * *"
  timeZone: "Asia/Shanghai"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: xhs-saas
            job-type: backup
        spec:
          serviceAccountName: xhs-saas
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: backup
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  PGPASSWORD=$(cat /secrets/postgres-password) pg_dump -h xhs-postgres -U xhs -d xhs \
                    --no-owner --clean --if-exists \
                    | gzip > /backup/xhs-backup-${TIMESTAMP}.sql.gz
                  find /backup -name 'xhs-backup-*.sql.gz' -mtime +7 -delete
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: xhs-saas-secrets
                      key: POSTGRES_PASSWORD
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: xhs-saas-backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xhs-saas-backup
  namespace: xhs-saas
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
