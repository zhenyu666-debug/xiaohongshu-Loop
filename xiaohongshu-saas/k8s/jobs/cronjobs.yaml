apiVersion: batch/v1
kind: CronJob
metadata:
  name: xhs-cookie-refresh
  namespace: xhs-saas
  labels:
    app: xhs-saas
    job-type: cookie-refresh
spec:
  schedule: "0 */6 * * *"
  timeZone: "Asia/Shanghai"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: xhs-saas
            job-type: cookie-refresh
        spec:
          serviceAccountName: xhs-saas
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: cookie-refresh
              image: xhs-saas/backend:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.scheduler.jobs.cookie_refresh"]
              envFrom:
                - configMapRef:
                    name: xhs-saas-config
                - secretRef:
                    name: xhs-saas-secrets
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "2Gi"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: cookies
                  mountPath: /app/data/cookies
          volumes:
            - name: cookies
              persistentVolumeClaim:
                claimName: xhs-saas-cookies
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: xhs-content-publish
  namespace: xhs-saas
  labels:
    app: xhs-saas
    job-type: scheduled-publish
spec:
  schedule: "*/15 * * * *"
  timeZone: "Asia/Shanghai"
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: xhs-saas
            job-type: scheduled-publish
        spec:
          serviceAccountName: xhs-saas
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: publish-runner
              image: xhs-saas/backend:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.scheduler.jobs.run_scheduled"]
              envFrom:
                - configMapRef:
                    name: xhs-saas-config
                - secretRef:
                    name: xhs-saas-secrets
              resources:
                requests:
                  cpu: "300m"
                  memory: "768Mi"
                limits:
                  cpu: "1500m"
                  memory: "3Gi"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: cookies
                  mountPath: /app/data/cookies
                - name: data
                  mountPath: /app/data
          volumes:
            - name: cookies
              persistentVolumeClaim:
                claimName: xhs-saas-cookies
            - name: data
              persistentVolumeClaim:
                claimName: xhs-saas-data
---
