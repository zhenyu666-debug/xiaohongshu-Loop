apiVersion: apps/v1
kind: Deployment
metadata:
  name: xhs-backend
  namespace: xhs-saas
  labels:
    app: xhs-backend
    tier: api
    component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: xhs-backend
  template:
    metadata:
      labels:
        app: xhs-backend
        tier: api
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: xhs-saas
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: xhs-backend
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for dependencies..."
              until nc -z xhs-postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
              until nc -z xhs-redis 6379; do
                echo "Waiting for redis..."
                sleep 2
              done
              echo "Dependencies ready."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
        - name: run-migrations
          image: xhs-saas/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: xhs-saas-config
            - secretRef:
                name: xhs-saas-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: embeddings
              mountPath: /data/embeddings
      containers:
        - name: backend
          image: xhs-saas/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: xhs-saas-config
            - secretRef:
                name: xhs-saas-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
              ephemeral-storage: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: embeddings
              mountPath: /data/embeddings
            - name: cookies
              mountPath: /app/data/cookies
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: xhs-saas-data
        - name: embeddings
          persistentVolumeClaim:
            claimName: xhs-saas-embeddings
        - name: cookies
          persistentVolumeClaim:
            claimName: xhs-saas-cookies
        - name: logs
          persistentVolumeClaim:
            claimName: xhs-saas-logs
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
