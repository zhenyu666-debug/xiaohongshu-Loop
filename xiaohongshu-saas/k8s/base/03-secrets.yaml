apiVersion: v1
kind: Secret
metadata:
  name: xhs-saas-secrets
  namespace: xhs-saas
  labels:
    app: xhs-saas
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql+asyncpg://xhs:CHANGE_ME@xhs-postgres:5432/xhs"

  # Redis
  REDIS_URL: "redis://xhs-redis:6379/0"

  # LLM API keys (use sealed-secrets or external-secrets in production)
  OPENAI_API_KEY: "sk-REPLACE_ME"
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"

  # Auth
  JWT_SECRET: "CHANGE_ME_TO_RANDOM_64_CHAR"
  SESSION_SECRET: "CHANGE_ME_TO_RANDOM_32_CHAR"

  # Cookies encryption (XHS publisher)
  COOKIE_ENCRYPTION_KEY: "CHANGE_ME_FERNET_KEY"
---
