apiVersion: v1
kind: Service
metadata:
  name: xhs-backend
  namespace: xhs-saas
  labels:
    app: xhs-backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: xhs-backend
---
apiVersion: v1
kind: Service
metadata:
  name: xhs-frontend
  namespace: xhs-saas
  labels:
    app: xhs-frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: xhs-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: xhs-redis
  namespace: xhs-saas
  labels:
    app: xhs-redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: xhs-redis
---
apiVersion: v1
kind: Service
metadata:
  name: xhs-postgres
  namespace: xhs-saas
  labels:
    app: xhs-postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: xhs-postgres
