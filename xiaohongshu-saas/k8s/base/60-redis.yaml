apiVersion: v1
kind: Service
metadata:
  name: xhs-redis
  namespace: xhs-saas
  labels:
    app: xhs-redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: xhs-redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: xhs-redis
  namespace: xhs-saas
  labels:
    app: xhs-redis
spec:
  serviceName: xhs-redis
  replicas: 1
  selector:
    matchLabels:
      app: xhs-redis
  template:
    metadata:
      labels:
        app: xhs-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          command:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1000"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: xhs-redis-data
  volumeClaimTemplates: []
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xhs-redis-data
  namespace: xhs-saas
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
