apiVersion: v1
kind: ConfigMap
metadata:
  name: xhs-saas-config
  namespace: xhs-saas
  labels:
    app: xhs-saas
data:
  # Application
  APP_ENV: "dev"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Shanghai"

  # Backend
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  BACKEND_WORKERS: "2"

  # Database
  DATABASE_URL: "sqlite+aiosqlite:///./data/xhs.db"

  # Vector Store
  VECTOR_STORE_TYPE: "chroma"
  VECTOR_STORE_PATH: "/data/embeddings"
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "50"

  # AI Config
  LLM_PROVIDER: "openai"
  DEFAULT_MODEL: "gpt-4o"
  EMBEDDING_MODEL: "text-embedding-3-small"
  RAG_TOP_K: "5"

  # Agent
  AGENT_MAX_ITERATIONS: "10"
  AGENT_TIMEOUT: "120"
  ENABLE_MULTIMODAL: "false"

  # MCP
  MCP_ENABLED: "true"

  # Frontend
  FRONTEND_PORT: "80"
  API_BASE_URL: "/api"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: xhs-saas-celery
  namespace: xhs-saas
  labels:
    app: xhs-saas
data:
  CELERY_BROKER_URL: "redis://xhs-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://xhs-redis:6379/1"
  CELERY_TASK_SERIALIZER: "json"
  CELERY_RESULT_SERIALIZER: "json"
  CELERY_ACCEPT_CONTENT: "['json']"
  CELERY_TIMEZONE: "Asia/Shanghai"
