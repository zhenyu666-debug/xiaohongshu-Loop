apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xhs-saas-data
  namespace: xhs-saas
  labels:
    app: xhs-saas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
