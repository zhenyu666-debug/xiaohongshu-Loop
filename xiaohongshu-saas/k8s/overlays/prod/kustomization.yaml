apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xhs-saas

resources:
  - ../../base

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: xhs-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: xhs-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: xhs-celery-worker
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4

configMapGenerator:
  - name: xhs-saas-config
    behavior: merge
    literals:
      - APP_ENV=prod
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://xhs:CHANGE_ME@xhs-postgres:5432/xhs
      - VECTOR_STORE_TYPE=chroma
      - LLM_PROVIDER=openai
      - ENABLE_MULTIMODAL=true
