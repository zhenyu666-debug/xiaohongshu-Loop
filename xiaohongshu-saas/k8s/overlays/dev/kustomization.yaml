apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xhs-saas

resources:
  - ../../base

namePrefix: dev-

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: xhs-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: xhs-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

configMapGenerator:
  - name: xhs-saas-config
    behavior: merge
    literals:
      - APP_ENV=dev
      - LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql+asyncpg://xhs:dev@xhs-postgres:5432/xhs
      - VECTOR_STORE_TYPE=chroma
      - LLM_PROVIDER=mock
